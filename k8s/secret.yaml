# IMPORTANT: Replace all values before deploying.
# For production, use a secrets manager (Vault, Sealed Secrets, ESO) instead of
# committing this file with real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: caseflow-secret
  namespace: caseflow
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "caseflow"
  SPRING_DATASOURCE_PASSWORD: "change-me"
  CASEFLOW_MINIO_ACCESS_KEY: "change-me"
  CASEFLOW_MINIO_SECRET_KEY: "change-me-secret"
