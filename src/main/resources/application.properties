spring.application.name=caseflow

# ── Server ────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── PostgreSQL ────────────────────────────────────────────────────────────────
# Override SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD for containerized runs
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/caseflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:caseflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:caseflow}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── MongoDB ───────────────────────────────────────────────────────────────────
# Override SPRING_DATA_MONGODB_URI for containerized runs
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/caseflow}

# ── Springdoc / Swagger ───────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when-authorized}
# Enable dedicated /actuator/health/liveness and /actuator/health/readiness for Kubernetes probes
management.health.probes.enabled=${MANAGEMENT_HEALTH_PROBES_ENABLED:false}

# ── Storage ───────────────────────────────────────────────────────────────────
# Override CASEFLOW_STORAGE_ROOT_PATH for containerized runs (e.g. /app/storage-data)
caseflow.storage.root-path=${CASEFLOW_STORAGE_ROOT_PATH:./storage-data}
# provider: 'local' (default) or 'minio'
caseflow.storage.provider=${CASEFLOW_STORAGE_PROVIDER:local}
# MinIO connection (used when provider=minio)
caseflow.storage.minio.endpoint=${CASEFLOW_MINIO_ENDPOINT:http://localhost:9000}
caseflow.storage.minio.access-key=${CASEFLOW_MINIO_ACCESS_KEY:minioadmin}
caseflow.storage.minio.secret-key=${CASEFLOW_MINIO_SECRET_KEY:minioadmin}
caseflow.storage.minio.bucket=${CASEFLOW_MINIO_BUCKET:caseflow}

# ── CORS ──────────────────────────────────────────────────────────────────────
caseflow.cors.allowed-origins=${CASEFLOW_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.caseflow=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=WARN
