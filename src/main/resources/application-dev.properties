# Dev profile — safe to use locally, must NOT be active in production

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.caseflow=DEBUG
logging.level.org.springframework.security=DEBUG

# Swagger fully open in dev
springdoc.swagger-ui.disable-swagger-default-url=false

# Relax password policy if needed for seed users
caseflow.dev.seed-data=true
