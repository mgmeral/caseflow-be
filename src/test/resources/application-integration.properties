# Integration test profile — datasource/mongo URLs are overridden by Testcontainers @DynamicPropertySource.
# Flyway must run so schema validation passes.
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate

# SMTP disabled — no mail server in integration tests
caseflow.smtp.enabled=false

# Scheduling disabled — prevents background workers interfering with tests
spring.task.scheduling.enabled=false
caseflow.email.ingress.retry-interval-ms=3600000
caseflow.email.dispatch.retry-interval-ms=3600000

# Storage: local (no MinIO needed)
caseflow.storage.provider=local
caseflow.storage.root-path=./target/test-storage-data

# JWT secret (any 256-bit value works for tests)
caseflow.jwt.secret=integration-test-secret-key-must-be-at-least-256-bits-long-ok

# Logging — reduce noise
logging.level.com.caseflow=WARN
logging.level.org.flywaydb=INFO
logging.level.org.springframework.security=WARN
