name: CI

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

# ─── Environment ─────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Build + Test
  # All tests are unit / @WebMvcTest — no real databases required.
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build and run tests
        run: mvn verify --batch-mode --no-transfer-progress

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      # Upload JAR so the docker job can use it without re-running Maven
      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/caseflow-*.jar
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Docker Build (+ conditional push to GHCR on main/master)
  #
  # Uses Dockerfile.ci which copies the pre-built JAR from Job 1.
  # This avoids running Maven twice and keeps image builds fast.
  #
  # Image push is enabled automatically on pushes to main/master using
  # the built-in GITHUB_TOKEN (no extra secrets required for GHCR).
  # For a custom registry, see the "Custom registry" section in docs/ci-cd.md.
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Short commit SHA on every build
            type=sha,prefix=sha-,format=short
            # 'latest' tag only on default branch pushes
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            # Branch name tag (e.g. develop)
            type=ref,event=branch

      # Log in only when actually pushing (not on PRs)
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          # Push on main/master push events only; build-only on PRs and other branches
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
